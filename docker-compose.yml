services:
  doris-storage-adapter:
    image: doris-storage-adapter
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - System__DatasetAccessMode=Open
      - System__EnableTenancy=false
      - Storage__Provider=FileSystem
      - Storage__FileSystem__BasePath=/tmp/doris-data
      - Storage__FileSystem__TempFilePath=/tmp
      - Security__AllowReadDraftFiles=true
      - Security__JwksUri=http://doris-storage-adapter:8080/jwks
      - Security__CorsAllowedOrigins__0=http://doris-storage-adapter:8080
      - PublicUrl=http://doris-storage-adapter:8080