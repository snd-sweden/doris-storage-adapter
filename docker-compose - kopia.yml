services:
  doris-storage-adapter:
    image: doris-storage-adapter
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Publication__AllowPublicAccessRight=true
      - Storage__Provider=FileSystem
      - Storage__FileSystem__BasePath=/tmp/doris-data
      - Storage__FileSystem__TempFilePath=/tmp
      - Storage__S3__ServiceUrl=http://rustfs:9000
      - Storage__S3__BucketName=my-bucket
      - Storage__S3__AccessKey=myaccesskey
      - Storage__S3__SecretKey=mysecretkey
      - Storage__S3__ForcePathStyle=true
      - Storage__S3__MultiPartUploadThreshold=104857600
      - Storage__S3__MultiPartUploadChunkSize=10485760
      - Storage__S3__RequestChecksumCalculationEnabled=false # måste sättas till false för att multipart upload ska fungera
      - Storage__S3__ResponseChecksumCalculationEnabled=true
      - Authorization__AllowReadDraftFiles=true
      - Authorization__JwksUri=http://doris-storage-adapter:8080/jwks
      - Authorization__CorsAllowedOrigins__0=http://doris-storage-adapter:8080
      - PublicUrl=http://doris-storage-adapter:8080

