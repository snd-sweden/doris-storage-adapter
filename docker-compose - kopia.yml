  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      RUSTFS_ACCESS_KEY: myaccesskey
      RUSTFS_SECRET_KEY: mysecretkey
      RUSTFS_CONSOLE_ENABLE: "true"
    command:
      - --console-enable
      - --access-key
      - myaccesskey
      - --secret-key
      - mysecretkey
      - /data
    volumes:
      - rustfs-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  create-bucket:
    image: minio/mc:latest
    container_name: rustfs-create-bucket
    depends_on:
      rustfs:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set rustfs http://rustfs:9000 myaccesskey mysecretkey &&
      mc mb rustfs/my-bucket || true
      "
    restart: "no"

volumes:
  rustfs-data:

